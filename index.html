<style>
  :root {
    --bg: #05080a; --panel: #0b1210; --green: #39ff8f; --red: #ff4d4d;
    --dim: #6b8f80; --line: #12241c; --text: #d6ffe9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(circle at 50% -10%, #0e1f18 0%, var(--bg) 60%);
    color: var(--text); font-family: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
    padding: 20px;
  }
  h1 { font-size: 19px; letter-spacing: 3px; color: var(--green);

  .meta { color: var(--dim); font-size: 12px; margin-bottom: 18px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab { padding: 8px 16px; border: 1px solid var(--line); border-radius: 4px;
         cursor: pointer; color: var(--dim); font-size: 12px; letter-spacing: 1px; }
  .tab.active { color: var(--green); border-color: var(--green);
                box-shadow: 0 0 10px rgba(57,255,143,0.25); }
  .controls { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  input, select { background: var(--panel); border: 1px solid var(--line); color: var(--text);
                   padding: 7px 10px; border-radius: 4px; font-family: inherit; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: var(--dim); border-bottom: 1px solid var(--line);
       cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--green); }
  td { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); white-space: nowrap; }
  tr:hover td { background: rgba(57,255,143,0.04); }
  .buy { color: var(--green); font-weight: 600; }
  .sell { color: var(--red); font-weight: 600; }
  .panel { display: none; overflow-x: auto; }
  .panel.active { display: block; }
  .count { color: var(--dim); font-size: 12px; margin-top: 10px; }
</style>

let state = { sortKey: null, sortDir: 1, search: '', side: '', tf: '' };

function uniqueTFs() {
  const s = new Set();
  BOXES.forEach(b => s.add(b.timeframe));
  SIGNALS.forEach(b => s.add(b.timeframe));
  return [...s].sort();
}
function populateTF() {
  const sel = document.getElementById('tfFilter');
  uniqueTFs().forEach(tf => {
    const opt = document.createElement('option');
    opt.value = tf; opt.textContent = tf; sel.appendChild(opt);
  });
}
function filteredRows(rows, sideKey) {
  return rows.filter(r => {
    if (state.search && !r.symbol.toLowerCase().includes(state.search.toLowerCase())) return false;
    if (state.tf && r.timeframe !== state.tf) return false;
    if (state.side && r[sideKey] !== state.side) return false;
    return true;
  });
}
function sortRows(rows) {
  if (!state.sortKey) return rows;
  return [...rows].sort((a, b) => {
    const av = a[state.sortKey], bv = b[state.sortKey];
    if (typeof av === 'number') return (av - bv) * state.sortDir;
    return String(av).localeCompare(String(bv)) * state.sortDir;
  });
}
function renderBoxes() {
  const rows = sortRows(filteredRows(BOXES, 'box'));
  document.querySelector('#tbl-boxes tbody').innerHTML = rows.map(b => `
    <tr><td>${b.symbol}</td><td>${b.timeframe}</td>
    <td class="${b.box.startsWith('GREEN') ? 'buy' : 'sell'}">${b.box}</td>
    <td>${b.formed_on}</td><td>${b.candles_ago}</td>
    <td>${b.box_low.toFixed(2)}</td><td>${b.box_high.toFixed(2)}</td>
    <td>${b.last_close.toFixed(2)}</td><td>${b.position}</td></tr>`).join('');
  document.getElementById('count-boxes').textContent = `${rows.length} active box(es)`;
}
function renderSignals() {
  const rows = sortRows(filteredRows(SIGNALS, 'signal'));
  document.querySelector('#tbl-signals tbody').innerHTML = rows.map(s => `
    <tr><td>${s.symbol}</td><td>${s.timeframe}</td>
    <td class="${s.signal === 'BUY' ? 'buy' : 'sell'}">${s.signal}</td>
    <td>${s.candle_date}</td><td>${s.box_low.toFixed(2)}</td>
    <td>${s.box_high.toFixed(2)}</td><td>${s.close.toFixed(2)}</td></tr>`).join('');
  document.getElementById('count-signals').textContent = `${rows.length} signal(s)`;
}
function renderAll() { renderBoxes(); renderSignals(); }

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
  });
});
document.querySelectorAll('th[data-key]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.key;
    if (state.sortKey === key) state.sortDir *= -1;
    else { state.sortKey = key; state.sortDir = 1; }
    renderAll();
  });
});
document.getElementById('search').addEventListener('input', e => { state.search = e.target.value; renderAll(); });
document.getElementById('sideFilter').addEventListener('change', e => { state.side = e.target.value; renderAll(); });
document.getElementById('tfFilter').addEventListener('change', e => { state.tf = e.target.value; renderAll(); });

populateTF();
renderAll();
</script>
